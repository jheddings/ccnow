# Draft a release for a new version tag
---
name: Create Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: npx git-cliff --latest > /tmp/release-notes.md

      - name: Create draft release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "ccnow ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
