name: Preflight Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Run preflight checks
        run: just preflight
