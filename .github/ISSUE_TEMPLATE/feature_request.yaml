name: Feature Request
description: Suggest a new feature or enhancement
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill out the sections below to help us understand your idea.

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Provide a clear and concise description of the feature you'd like to see.
      placeholder: |
        Example: I would like a segment that shows the current vim mode (NORMAL/INSERT).
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Explain the problem or need this feature would address.
      placeholder: |
        Example: When using vim mode in Claude Code, I can't tell which mode I'm in without checking the main UI.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: How would you use this feature?
      description: Walk us through a typical scenario where you'd use this feature.
      placeholder: |
        Example:
        1. Enable vim mode in Claude Code
        2. The statusline shows 'NORMAL' or 'INSERT' next to the git branch
        3. When I press 'i', the mode indicator updates immediately
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: How do you imagine this working?
      description: |
        Describe how you think this feature should work. This could be a new segment,
        a new preset, a configuration option, etc.
      placeholder: |
        Example: A new VimMode segment that reads vim.mode from the session data
        and displays it with configurable colors for each mode.

  - type: textarea
    id: alternatives
    attributes:
      label: Have you tried any workarounds?
      description: Are there any current workarounds you're using?
      placeholder: |
        Example: I'm using a custom JSON config with a literal segment, but it doesn't update dynamically.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      description: Help us understand the priority from your perspective.
      options:
        - 'Nice to have - would be convenient'
        - 'Important - would improve my workflow significantly'
        - 'Critical - I really need this to use ccnow effectively'
        - 'Unsure'
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Add any other context, examples, or references here. Screenshots of
        other statusline tools with similar features are helpful.
      placeholder: Any additional information that might be helpful.
